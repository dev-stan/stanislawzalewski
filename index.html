<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    -webkit-font-smoothing: antialiased;
    font-family: 'Inter', sans-serif;
    background: #FAF9F6;
    color: #17140F;
    width: 100%;
    overflow-x: hidden;
  }
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* Photo clipped into a static blob - sits to the right of the hero text */
  .hero-blob {
    position: absolute; z-index: 0;
    top: 50%; right: 4%; transform: translateY(-50%);
    pointer-events: none;
  }
  .hero-blob svg { display: block; width: 560px; height: 560px; overflow: visible; }
  @media (max-width: 1100px) {
    .hero-blob svg { width: 360px; height: 360px; }
  }
  @media (max-width: 900px) {
    .hero-blob { opacity: 0.5; right: -2%; }
    .hero-blob svg { width: 280px; height: 280px; }
  }
  @media (max-width: 640px) {
    .hero-blob { display: none; }
  }

  /* Scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(48px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px;
    background: rgba(250,249,246,0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(23,20,15,0.08);
  }
  .brand { font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }
  .brand span { color: oklch(53.139% 0.12465 241.363); }
  .lang-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; background: transparent;
    border: 1px solid rgba(23,20,15,0.25); border-radius: 999px;
    padding: 7px 14px; cursor: pointer; color: #17140F;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .lang-btn:hover { border-color: #17140F; background: rgba(23,20,15,0.06); }
  .nav { display: flex; align-items: center; gap: 28px; }
  .nav a {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
    letter-spacing: 0.06em; text-decoration: none; color: rgba(23,20,15,0.72);
    transition: color 0.2s ease; white-space: nowrap;
  }
  .nav a:hover { color: #17140F; }

  /* Hero */
  .hero { position: relative; overflow: hidden; }
  .hero-inner { position: relative; z-index: 1; padding: 120px 40px 100px; max-width: 1040px; margin: 0 auto; }
  .hero h1 {
    font-size: clamp(32px, 4.8vw, 64px); line-height: 1.05;
    letter-spacing: -0.03em; font-weight: 800; margin: 0 0 32px; max-width: 640px;
  }
  .hero-sub {
    font-size: clamp(17px, 2vw, 21px); line-height: 1.55;
    color: rgba(23,20,15,0.65); max-width: 560px; margin: 0 0 40px;
  }
  .hero-stat {
    display: inline-flex; flex-wrap: wrap; align-items: center; gap: 8px 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.4;
    color: rgba(23,20,15,0.6); padding: 13px 22px;
    border: 1px solid rgba(23,20,15,0.14); border-radius: 999px;
    max-width: 100%;
  }
  .hero-stat .stat-item { display: inline-flex; align-items: center; gap: 12px; min-width: 0; }
  .hero-stat .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: oklch(53.139% 0.12465 241.363); animation: pulseDot 2s ease infinite; flex-shrink: 0;
  }
  @media (max-width: 560px) {
    .hero-stat {
      display: flex; width: 100%; box-sizing: border-box;
      border-radius: 20px; flex-direction: column; align-items: stretch; padding: 16px 18px; gap: 10px; font-size: 12px;
    }
    .hero-stat .stat-item { align-items: flex-start; }
    .hero-stat .dot { margin-top: 5px; }
    .hero-stat .stat-item > span:last-child { overflow-wrap: anywhere; min-width: 0; }
  }

  .browser-bar {
    display: flex; align-items: center; gap: 8px; padding: 12px 16px;
  }
  .browser-bar .cd { width: 9px; height: 9px; border-radius: 50%; }
  .browser-bar .url {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-left: 10px;
  }
  .browser-shot { display: block; width: 100%; height: auto; }

  /* Clickable screenshots - subtle "inspect" affordance */
  .shot-wrap { position: relative; }
  .shot-btn {
    display: block; width: 100%; padding: 0; border: 0; margin: 0;
    background: none; cursor: zoom-in; -webkit-tap-highlight-color: transparent;
    font: inherit; color: inherit; text-align: left;
  }
  .shot-btn .browser-shot { transition: transform 0.5s cubic-bezier(0.2,0.7,0.2,1); }
  .shot-btn:hover .browser-shot { transform: scale(1.015); }
  .shot-zoom {
    position: absolute; z-index: 2; right: 14px; bottom: 14px;
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.06em;
    padding: 8px 13px; border-radius: 999px; pointer-events: none;
    background: rgba(17,20,15,0.62); color: #FAF9F6; backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    opacity: 0; transform: translateY(6px); transition: opacity 0.28s ease, transform 0.28s ease;
  }
  .shot-btn:hover .shot-zoom, .shot-btn:focus-visible .shot-zoom { opacity: 1; transform: translateY(0); }
  .shot-btn:focus-visible { outline: 2px solid oklch(53.139% 0.12465 241.363); outline-offset: 4px; }
  .shot-zoom svg { width: 13px; height: 13px; display: block; }
  @media (hover: none) {
    .shot-zoom { opacity: 1; transform: none; }
    .shot-btn:hover .browser-shot { transform: none; }
  }

  /* Lightbox modal */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: clamp(16px, 4vw, 48px);
    background: rgba(20,17,12,0.72); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    opacity: 0; visibility: hidden; transition: opacity 0.32s ease, visibility 0.32s ease;
  }
  .lightbox.is-open { opacity: 1; visibility: visible; }
  .lightbox-frame {
    position: relative; width: 100%; max-width: 1200px; max-height: 100%;
    display: flex; flex-direction: column;
    border-radius: 12px; overflow: hidden;
    background: #FAF9F6; box-shadow: 0 40px 120px rgba(0,0,0,0.6);
    transform: translateY(18px) scale(0.98);
    transition: transform 0.36s cubic-bezier(0.2,0.8,0.2,1);
  }
  .lightbox.is-open .lightbox-frame { transform: translateY(0) scale(1); }
  .lightbox-bar {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    padding: 12px 16px; background: #17140F;
  }
  .lightbox-bar .cd { width: 9px; height: 9px; border-radius: 50%; background: #C9A227; }
  .lightbox-bar .cd:nth-child(2) { opacity: 0.6; }
  .lightbox-bar .cd:nth-child(3) { opacity: 0.35; }
  .lightbox-bar .lb-url {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(250,249,246,0.55); margin-left: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .lightbox-close {
    margin-left: auto; flex-shrink: 0;
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(250,249,246,0.1); border: 1px solid rgba(250,249,246,0.2);
    color: #FAF9F6; transition: background 0.2s ease, border-color 0.2s ease;
  }
  .lightbox-close:hover { background: rgba(250,249,246,0.2); border-color: rgba(250,249,246,0.45); }
  .lightbox-close svg { width: 15px; height: 15px; }
  .lightbox-scroll { overflow: auto; -webkit-overflow-scrolling: touch; background: #FAF9F6; }
  .lightbox-img { display: block; width: 100%; height: auto; }
  @media (max-width: 560px) {
    .lightbox { padding: 12px; }
    .lightbox-frame { border-radius: 10px; }
    .lightbox-bar .lb-url { font-size: 10px; }
  }

  .eyebrow {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
  }
  .mono-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.14em; text-transform: uppercase;
  }

  /* Case studies carousel wrapper - transparent on desktop (sections stay stacked). */
  .cases-head { display: none; }
  /* On desktop .cases-track is a plain block, so the sections flow normally. */

  /* Desktop: hard cut-off - each case shows tag, title, intro, image, then stops.
     Hide everything that sits after the screenshot inside each case. */
  .cases-track .inner .shot-wrap ~ * { display: none; }
  .cases-track .shot-wrap { margin-bottom: 0 !important; }

  /* Case 01 - Kotowski */
  .kotowski { background: #12201A; color: #F3EFE6; padding: 100px 40px; position: relative; border-top: 1px solid rgba(243,239,230,0.14); }
  .kotowski .inner { max-width: 1080px; margin: 0 auto; }
  .kotowski .head-row {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 16px; margin-bottom: 36px;
    border-bottom: 1px solid rgba(201,162,39,0.35); padding-bottom: 24px;
  }
  .kotowski .head-row .tag { color: #C9A227; }
  .kotowski .head-row .domain { font-family:'JetBrains Mono',monospace; font-size:12px; color: rgba(243,239,230,0.5); }
  .kotowski h2 {
    font-family: 'Playfair Display', serif; font-size: clamp(30px,4.4vw,54px);
    font-weight: 600; line-height: 1.15; max-width: 800px; margin: 0 0 40px;
  }
  .kotowski .shot-wrap {
    border-radius: 12px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.35); margin-bottom: 56px;
  }
  .kotowski .browser-bar { background: #0C1712; }
  .kotowski .browser-bar .url { color: rgba(243,239,230,0.5); }
  .kotowski .grid {
    display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 56px; margin-bottom: 56px;
  }
  .kotowski .col { display: flex; flex-direction: column; gap: 24px; }
  .kotowski .col-right { display: flex; flex-direction: column; gap: 20px; }
  .kotowski .eyebrow { color: rgba(243,239,230,0.5); }
  .kotowski p { font-size: 16px; line-height: 1.6; margin: 0; color: rgba(243,239,230,0.9); }
  .kotowski .stack-val { font-family:'JetBrains Mono',monospace; font-size:14px; margin:0; color:#C9A227; }
  .kotowski .chip {
    display: inline-flex; align-self: flex-start; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.06em;
    border: 1px solid #C9A227; color: #C9A227; border-radius: 999px; padding: 8px 16px;
  }
  .kotowski .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: #C9A227; }
  .kotowski .timeline { display: flex; flex-wrap: wrap; gap: 12px; }
  .kotowski .timeline .step {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid rgba(201,162,39,0.4); border-radius: 999px; padding: 10px 18px;
  }
  .kotowski .timeline .year { font-family:'JetBrains Mono',monospace; font-size:12px; color:#C9A227; }
  .kotowski .timeline .label { font-size: 14px; color: #F3EFE6; }

  /* Case 02 - Dzieciaki */
  .dzieciaki { background: #FFFFFF; color: #0A2A3D; padding: 100px 40px; position: relative; overflow: hidden; border-top: 1px solid rgba(23,20,15,0.08); }
  .dzieciaki .blob-1 { position:absolute; top:-120px; right:-120px; width:340px; height:340px; border-radius:50%; background:#00A0E3; opacity:0.12; }
  .dzieciaki .blob-2 { position:absolute; bottom:-100px; left:-60px; width:220px; height:220px; border-radius:50%; background:#FFD23F; opacity:0.18; }
  .dzieciaki .inner { max-width: 1080px; margin: 0 auto; position: relative; }
  .dzieciaki .head-row {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 16px; margin-bottom: 32px;
  }
  .dzieciaki .tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.1em;
    text-transform: uppercase; background: #00A0E3; color: #fff;
    border-radius: 999px; padding: 8px 16px;
  }
  .dzieciaki .domain { font-family:'JetBrains Mono',monospace; font-size:12px; color: rgba(10,42,61,0.5); }
  .dzieciaki h2 {
    font-family: 'Baloo 2', sans-serif; font-size: clamp(32px,5vw,58px);
    font-weight: 700; line-height: 1.08; max-width: 820px; margin: 0 0 20px; color: #0A2A3D;
  }
  .dzieciaki .shot-wrap {
    border-radius: 20px; overflow: hidden; box-shadow: 0 24px 60px rgba(10,42,61,0.18); margin-bottom: 44px;
  }
  .dzieciaki .browser-bar { background: #0A2A3D; }
  .dzieciaki .browser-bar .url { color: rgba(255,255,255,0.6); }
  .dzieciaki .cards { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: stretch; }
  .dzieciaki .card-yellow {
    background: #FFF6D9; border: 2px solid #FFD23F; border-radius: 24px; padding: 32px;
  }
  .dzieciaki .card-yellow .card-title {
    font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 22px; margin-bottom: 12px; color: #0A2A3D;
  }
  .dzieciaki .card-yellow p { font-size:15px; line-height:1.6; margin:0; color:rgba(10,42,61,0.8); }
  .dzieciaki .card-dark { background: #0A2A3D; border-radius: 24px; padding: 32px; color: #fff; }
  .dzieciaki .card-dark .eyebrow { color: #00A0E3; }
  .dzieciaki .card-dark p { font-size:15px; line-height:1.6; margin:0; color:rgba(255,255,255,0.85); }

  /* Case 03 - Italy */
  .italy { background: #16141A; color: #EDE7DD; padding: 120px 40px; border-top: 1px solid rgba(237,231,221,0.12); }
  .italy .inner { max-width: 900px; margin: 0 auto; }
  .italy .head-row {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 16px; margin-bottom: 56px;
  }
  .italy .tag { color: #B99A6B; }
  .italy .domain { font-family:'JetBrains Mono',monospace; font-size:12px; color: rgba(237,231,221,0.45); }
  .italy h2 {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500;
    font-size: clamp(34px,5vw,64px); line-height: 1.15; margin: 0 0 24px; text-align: left;
  }
  .italy .shot-wrap {
    border-radius: 4px; overflow: hidden; box-shadow: 0 24px 70px rgba(0,0,0,0.5);
    margin-bottom: 56px; border: 1px solid rgba(185,154,107,0.3);
  }
  .italy .browser-bar { background: #0F0D12; }
  .italy .browser-bar .cd { background: transparent; border: 1px solid #B99A6B; }
  .italy .browser-bar .url { color: rgba(237,231,221,0.5); }
  .italy .stat-box {
    border: 1px solid rgba(185,154,107,0.35); border-radius: 4px; padding: 32px; margin-bottom: 56px;
  }
  .italy .stat-box .stat-title {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 600;
    font-size: 24px; margin-bottom: 12px; color: #EDE7DD;
  }
  .italy .stat-box p { font-size:15px; line-height:1.6; margin:0; color:rgba(237,231,221,0.7); }
  .italy .chapters-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: #B99A6B; text-align: center; margin-bottom: 32px;
  }
  .italy .chapters { display: flex; flex-direction: column; }
  .italy .chapter {
    display: grid; grid-template-columns: 60px 1fr; gap: 28px; padding: 28px 0;
    border-top: 1px solid rgba(185,154,107,0.25);
  }
  .italy .chapter .num { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:32px; color:#B99A6B; }
  .italy .chapter .ch-title {
    font-family:'Cormorant Garamond',serif; font-style:italic; font-size:22px; font-weight:600; margin-bottom:8px;
  }
  .italy .chapter p { font-size:15px; line-height:1.6; color:rgba(237,231,221,0.65); margin:0; }

  /* Case 04 - Żukowski */
  .zukowski { background: #FFFFFF; color: #111111; padding: 120px 40px; border-top: 1px solid #111; border-bottom: 1px solid #111; }
  .zukowski .inner { max-width: 1080px; margin: 0 auto; }
  .zukowski .head-row {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 16px; margin-bottom: 12px;
  }
  .zukowski .domain { font-family:'JetBrains Mono',monospace; font-size:12px; color: rgba(17,17,17,0.5); }
  .zukowski .rule { height: 1px; background: #111; margin-bottom: 48px; }
  .zukowski h2 {
    font-family: 'EB Garamond', serif; font-style: italic; font-weight: 500;
    font-size: clamp(30px,4.4vw,52px); line-height: 1.15; max-width: 780px; margin: 0 0 20px;
  }
  .zukowski .shot-wrap { border: 1px solid #111; margin-bottom: 64px; }
  .zukowski .browser-bar { border-bottom: 1px solid #111; }
  .zukowski .browser-bar .cd { background: transparent; border: 1px solid #111; }
  .zukowski .browser-bar .url { color: rgba(17,17,17,0.5); }
  .zukowski .browser-shot { filter: grayscale(1); }
  .zukowski .plates { display: grid; grid-template-columns: repeat(3,1fr); gap: 0; border-top: 1px solid #111; }
  .zukowski .plate { border-right: 1px solid #111; padding: 28px 24px; }
  .zukowski .plate .num { font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(17,17,17,0.5); margin-bottom:36px; }
  .zukowski .plate .placeholder {
    aspect-ratio: 4/3; margin-bottom: 20px; border: 1px solid #111;
    background: repeating-linear-gradient(135deg,#f2f2f2,#f2f2f2 8px,#e2e2e2 8px,#e2e2e2 16px);
  }
  .zukowski .plate .plate-label { font-family:'EB Garamond',serif; font-style:italic; font-size:20px; margin-bottom:8px; }
  .zukowski .plate p { font-size:13px; line-height:1.5; color:rgba(17,17,17,0.6); margin:0; }

  /* Intro - O mnie / Usługi / Stack + Doświadczenie (between hero and case studies) */
  .intro-block { background: #FAF9F6; color: #17140F; padding: 0 40px 96px; }
  .intro-block .inner { max-width: 1080px; margin: 0 auto; }
  .intro-block .kicker {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.16em;
    text-transform: uppercase; color: rgba(23,20,15,0.55); margin-bottom: 22px;
  }
  .intro-block .lead {
    font-size: clamp(20px,2.6vw,26px); line-height: 1.42; font-weight: 500;
    max-width: 620px; margin: 0 0 64px; letter-spacing: -0.01em;
  }

  /* Author card (name + photo) - mobile only; hidden on desktop/tablet. */
  .intro-block .author-card { display: none; }

  /* Usługi grid */
  .intro-block .services-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: rgba(23,20,15,0.45); margin-bottom: 18px;
  }
  .intro-block .services {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 72px;
  }
  .intro-block .service {
    border: 1px solid rgba(23,20,15,0.12); border-radius: 14px; padding: 22px 22px 26px;
    background: #FAF9F6;
  }
  .intro-block .service .s-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; letter-spacing: -0.01em; }
  .intro-block .service .s-body { font-size: 13px; line-height: 1.5; color: rgba(23,20,15,0.55); margin: 0; }
  .intro-block .services-dots { display: none; }

  /* ---- Usługi marquee (desktop only, > 900px) ----
     One row of cards that slowly, endlessly scrolls sideways. The JS clones the
     cards so the strip loops seamlessly, and drives the transform in a rAF loop
     so the user can also grab and drag the row left/right. Hovering pauses the
     auto-drift; dragging scrubs it directly. */
  @media (min-width: 901px) {
    .intro-block .services.is-marquee {
      display: block; position: relative;
      margin-bottom: 72px; overflow: hidden;
      cursor: grab; touch-action: pan-y;
      /* Bleed to the section edges and fade both ends so cards enter/exit softly. */
      margin-left: -40px; margin-right: -40px;
      -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
              mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
    }
    .intro-block .services.is-marquee.is-dragging { cursor: grabbing; }
    /* Keep text/images from being selected or ghost-dragged while scrubbing. */
    .intro-block .services.is-marquee.is-dragging .marquee-track { user-select: none; }
    .intro-block .services.is-marquee .marquee-track {
      display: flex; flex-wrap: nowrap; gap: 16px; width: max-content;
      padding: 4px 40px;
      will-change: transform;
    }
    .intro-block .services.is-marquee .service {
      flex: 0 0 300px; width: 300px;
    }
  }

  /* Stack + Doświadczenie panels */
  .intro-block .panels { display: grid; grid-template-columns: 1fr 1.35fr; gap: 24px; }
  .intro-block .panel {
    border: 1px solid rgba(23,20,15,0.12); border-radius: 14px; padding: 24px 24px 28px;
  }
  .intro-block .panel-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: rgba(23,20,15,0.45);
    padding-bottom: 18px; margin-bottom: 18px; border-bottom: 1px solid rgba(23,20,15,0.1);
  }
  .intro-block .stack-list { display: flex; flex-direction: column; }
  .intro-block .stack-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 0;
    border-top: 1px solid rgba(23,20,15,0.08);
  }
  .intro-block .stack-row:first-child { border-top: none; padding-top: 0; }
  .intro-block .stack-row .initial {
    width: 24px; height: 24px; border-radius: 50%; background: #17140F; color: #FAF9F6;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .intro-block .stack-row .name { font-size: 14px; }
  .intro-block .exp-list { display: flex; flex-direction: column; }
  .intro-block .exp-row {
    display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
    padding: 14px 0; border-top: 1px solid rgba(23,20,15,0.08);
  }
  .intro-block .exp-row:first-child { border-top: none; padding-top: 0; }
  .intro-block .exp-row .role { font-size: 14px; font-weight: 600; margin-bottom: 3px; letter-spacing: -0.01em; }
  .intro-block .exp-row .org { font-size: 13px; color: rgba(23,20,15,0.5); }
  .intro-block .exp-row .period {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.04em;
    color: rgba(23,20,15,0.45); white-space: nowrap; flex-shrink: 0;
  }

  @media (max-width: 900px) {
    .intro-block .services { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 760px) {
    .intro-block { padding: 0 20px 72px; }
    .intro-block .panels { grid-template-columns: 1fr; }
    /* Hide Doświadczenie i edukacja panel on mobile */
    .intro-block .panel:nth-child(2) { display: none; }

    /* Author card: blob-clipped photo + name + role, sits above the lead.
       Photo uses the same organic blob shape as the desktop hero. */
    .intro-block .kicker { margin-bottom: 24px; }
    .intro-block .author-card {
      display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
    }
    .intro-block .author-photo {
      display: block; width: auto; flex-shrink: 0;
      padding: 0; border: 0; margin: 0; background: none;
      cursor: zoom-in; -webkit-tap-highlight-color: transparent; line-height: 0;
    }
    /* The SVG's viewBox is tightened to the blob's bounds so it fills the box
       without empty padding pushing the name/role sideways. */
    .intro-block .author-photo svg {
      display: block; width: 78px; height: 78px; overflow: visible;
      transition: transform 0.4s cubic-bezier(0.2,0.7,0.2,1);
    }
    .intro-block .author-photo:active svg { transform: scale(0.97); }
    .intro-block .author-photo:focus-visible {
      outline: 2px solid oklch(53.139% 0.12465 241.363); outline-offset: 2px; border-radius: 8px;
    }
    .intro-block .author-name {
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15;
    }
    .intro-block .author-role {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      color: rgba(23,20,15,0.55); margin-top: 6px;
    }
  }
  @media (max-width: 480px) {
    /* Usługi becomes a horizontal carousel - full cards paged sideways. */
    .intro-block .services {
      display: flex; grid-template-columns: none; gap: 14px;
      margin-bottom: 20px;
      overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; -ms-overflow-style: none;
      /* Bleed to the section edges so the peek sits against the screen edge. */
      margin-left: -20px; margin-right: -20px;
      padding: 4px 20px; scroll-padding: 0 20px;
    }
    .intro-block .services::-webkit-scrollbar { display: none; }
    .intro-block .service {
      flex: 0 0 84%; scroll-snap-align: start;
      padding: 24px 24px 28px;
    }
    .intro-block .service .s-title { font-size: 18px; margin-bottom: 12px; }
    .intro-block .service .s-body { font-size: 15px; }

    /* Dot indicators. */
    .intro-block .services-dots {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 56px;
    }
    .intro-block .services-dots .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(23,20,15,0.18); transition: background 0.2s ease;
    }
    .intro-block .services-dots .dot.is-active { background: rgba(23,20,15,0.75); }
  }

  /* Reviews / Social proof */
  .reviews { background: #FAF9F6; color: #17140F; padding: 104px 40px 152px; border-top: 1px solid rgba(23,20,15,0.08); }
  .reviews .inner { max-width: 900px; margin: 0 auto; }
  .reviews .kicker {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.14em; text-transform: uppercase; color: rgba(23,20,15,0.5);
    text-align: center; margin-bottom: 14px;
  }
  .reviews .rev-title {
    font-size: clamp(26px,3.6vw,40px); font-weight: 800; letter-spacing: -0.02em;
    text-align: center; margin: 0 0 48px; line-height: 1.15;
  }
  /* Horizontal scroll-snap track: swipe with a thumb, or grab-and-drag with a
     mouse (like the usługi row). Each card is a full-width snap point; the
     scrollbar itself is hidden. */
  .reviews .stage {
    display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
    gap: 0; padding-bottom: 4px;
    -webkit-overflow-scrolling: touch; cursor: grab;
    scrollbar-width: none; -ms-overflow-style: none;
    /* Soften the left/right clip edges so cards fade into the container while
       scrolling instead of showing a hard cut (like the usługi marquee). The
       48px fade sits in the slot's inset, so the centred panel's shadow - whose
       faint tail also reaches ~48px - stays visually intact. */
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 48px, #000 calc(100% - 48px), transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 48px, #000 calc(100% - 48px), transparent 100%);
  }
  .reviews .stage::-webkit-scrollbar { display: none; }
  .reviews .stage.is-dragging { cursor: grabbing; scroll-snap-type: none; }
  .reviews .stage.is-dragging .rev-card { user-select: none; }
  /* Each card is a full-width, transparent snap slot. Its horizontal padding
     insets the visible panel from the scroll box edge, so the panel's drop
     shadow renders inside that padding and is never clipped by the scroller. */
  .reviews .rev-card {
    flex: 0 0 100%; scroll-snap-align: center;
    padding: 44px 48px; box-sizing: border-box;
  }
  .reviews .rev-inner {
    display: flex; flex-direction: column; justify-content: center;
    background: #FFFFFF; border: 1px solid rgba(23,20,15,0.1);
    border-radius: 20px; padding: 44px 48px;
    box-shadow: 0 18px 48px rgba(23,20,15,0.06);
  }
  .reviews .rev-card img, .reviews .rev-card svg { pointer-events: none; }
  .reviews .rev-stars { display: flex; gap: 4px; margin-bottom: 20px; color: #E0A100; }
  .reviews .rev-stars svg { width: 20px; height: 20px; }
  .reviews .rev-quote {
    font-family: 'Playfair Display', serif; font-weight: 500;
    font-size: clamp(18px,2.1vw,23px); line-height: 1.5; margin: 0 0 28px;
    color: #17140F;
  }
  .reviews .rev-who { display: flex; align-items: center; gap: 14px; }
  .reviews .rev-avatar {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #FAF9F6;
    background: oklch(53.139% 0.12465 241.363);
  }
  .reviews .rev-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .reviews .rev-role { font-size: 13px; color: rgba(23,20,15,0.55); margin-top: 2px; }
  .reviews .rev-dots { display: flex; justify-content: center; gap: 10px; margin-top: 36px; }
  .reviews .rev-dots button {
    width: 9px; height: 9px; border-radius: 50%; padding: 0; cursor: pointer;
    border: none; background: rgba(23,20,15,0.18); transition: background 0.2s ease, width 0.2s ease;
  }
  .reviews .rev-dots button.is-active { background: oklch(53.139% 0.12465 241.363); width: 26px; border-radius: 999px; }
  @media (max-width: 640px) {
    .reviews { padding: 72px 12px 140px; }
    .reviews .rev-title { margin-bottom: 32px; }
    /* Keep a >=48px horizontal inset on the slot so the panel's shadow always
       has room and never clips; only the inner content padding tightens. */
    .reviews .rev-card { padding: 32px 48px; }
    .reviews .rev-inner { padding: 32px 26px; }
    .reviews .rev-quote { font-size: 17px; }
    .reviews .rev-dots { margin-top: 28px; }
  }
  @media (max-width: 380px) {
    .reviews .rev-card { padding: 28px 48px; }
    .reviews .rev-inner { padding: 28px 22px; }
    .reviews .rev-quote { font-size: 16px; }
  }

  /* Contact */
  .contact { background: #17140F; color: #FAF9F6; padding: 100px 40px 48px; }
  .contact .inner { max-width: 1080px; margin: 0 auto; }
  .contact h2 { font-size: clamp(32px,5vw,56px); font-weight: 800; letter-spacing: -0.02em; margin: 0 0 20px; }
  .contact .body { font-size:17px; line-height:1.6; color:rgba(250,249,246,0.65); max-width:520px; margin:0 0 40px; }
  .contact .links { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 64px; }
  .contact .link {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    border-radius: 999px; padding: 14px 24px; text-decoration: none; font-weight: 600;
    transition: border-color 0.2s ease, opacity 0.2s ease;
  }
  .contact .link-primary { background: oklch(53.139% 0.12465 241.363); color: #17140F; }
  .contact .link-primary:hover { opacity: 0.9; }
  .contact .link-ghost { border: 1px solid rgba(250,249,246,0.3); color: #FAF9F6; }
  .contact .link-ghost:hover { border-color: #FAF9F6; }
  .contact .footer {
    display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 12px;
    padding-top: 24px; border-top: 1px solid rgba(250,249,246,0.14);
  }
  .contact .footer .rights { font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(250,249,246,0.4); }

  /* Responsive */
  @media (max-width: 760px) {
    .header { padding: 14px 16px; gap: 10px; }
    .nav { gap: 14px; }
    .nav a { font-size: 11px; letter-spacing: 0.03em; }
    .lang-btn { padding: 6px 10px; }
    .hero-inner { padding: 48px 20px 64px; }
    .kotowski, .dzieciaki, .italy, .zukowski { padding-top: 72px; padding-bottom: 72px; padding-left: 20px; padding-right: 20px; }
    .contact { padding: 72px 20px 40px; }
    .kotowski .grid { grid-template-columns: 1fr; gap: 32px; }
    .kotowski .shot-wrap { margin-bottom: 40px; }
    .kotowski .grid, .kotowski h2 { margin-bottom: 40px; }
    .dzieciaki .cards { grid-template-columns: 1fr; }
    .dzieciaki .card-yellow, .dzieciaki .card-dark { padding: 26px; }
    .italy .head-row, .italy .shot-wrap, .italy .stat-box { margin-bottom: 40px; }
    .italy .stat-box { padding: 26px; }
    .italy .chapter { grid-template-columns: 44px 1fr; gap: 18px; padding: 22px 0; }
    .zukowski .plates { grid-template-columns: 1fr; }
    .zukowski .plate { border-right: none; border-bottom: 1px solid #111; }
    .zukowski .plate:last-child { border-bottom: none; }
    .zukowski .plate .num { margin-bottom: 16px; }
    .contact .footer { justify-content: center; }
  }
  @media (max-width: 440px) {
    .brand { display: none; }
    .header { justify-content: space-between; }
    .contact .links { flex-direction: column; align-items: stretch; }
    .contact .link { text-align: center; }
  }

  /* ---- Case studies: horizontal carousel (mobile only) ---- */
  @media (max-width: 560px) {
    .cases-carousel { background: #FAF9F6; padding: 8px 20px 0; overflow: hidden; }

    /* Header: "CASE STUDIES" label + 01-04 number pills. */
    .cases-head { display: block; }
    .cases-label {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.14em;
      text-transform: uppercase; color: #B99A6B; margin-bottom: 16px;
    }
    .cases-pills { display: flex; gap: 12px; margin-bottom: 20px; }
    .cases-pills .pill {
      flex: 1 1 0; -webkit-appearance: none; appearance: none; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600;
      letter-spacing: 0.06em; text-align: center; padding: 16px 0;
      background: #FFFFFF; color: rgba(23,20,15,0.6);
      border: 1px solid rgba(23,20,15,0.14); border-radius: 14px;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .cases-pills .pill.is-active {
      background: #17140F; color: #FAF9F6; border-color: #17140F;
    }

    /* Track: full-width pages, paged sideways with snap. */
    .cases-track {
      display: flex; gap: 0;
      overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; -ms-overflow-style: none;
      /* Bleed to the section edges so each page fills the screen edge-to-edge. */
      margin: 0 -20px;
    }
    .cases-track::-webkit-scrollbar { display: none; }

    /* Each case study becomes one full-width, self-contained page. */
    .cases-track > section {
      flex: 0 0 100%; width: 100%; scroll-snap-align: start;
      padding: 40px 20px 32px !important;
      border: none; margin: 0;
    }
    /* Thin top border on each project card, tuned to its background. */
    .cases-track > section.kotowski { border-top: 1px solid rgba(243,239,230,0.14); }
    .cases-track > section.dzieciaki { border-top: 1px solid rgba(23,20,15,0.08); }
    .cases-track > section.italy { border-top: 1px solid rgba(237,231,221,0.12); }
    .cases-track > section.zukowski { border-top: 1px solid #111; border-bottom: 1px solid #111; }
    /* Swiped-in cards must never be blank - reveal is handled by the carousel. */
    .cases-track > section.reveal { opacity: 1; transform: none; transition: none; }
    /* Neutralize decorative section separators inside the carousel. */
    .cases-track .zukowski .rule { display: none; }

    /* Mobile card = tag, title, short description, image - then stop.
       Hide everything that sits after the screenshot inside each case. */
    .cases-track .inner .shot-wrap ~ * { display: none; }
    /* Image is the last visible element - drop its trailing margin so the
       contact section starts right below it. */
    .cases-track .shot-wrap { margin-bottom: 0 !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { transition: none; opacity: 1; transform: none; }
    .hero-stat .dot { animation: none; }
    .shot-btn .browser-shot { transition: none; }
    .shot-btn:hover .browser-shot { transform: none; }
    .lightbox, .lightbox-frame { transition: opacity 0.2s ease, visibility 0.2s ease; }
    .lightbox.is-open .lightbox-frame { transform: none; }
    .lightbox-frame { transform: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->

<!-- 1b. INTRO - O MNIE / USŁUGI / STACK + DOŚWIADCZENIE -->
<section class="intro-block reveal" id="about">
  <div class="inner">

    <!-- Author card - mobile only. Blob-clipped photo + name + role, above the lead.

    <div class="author-card">

        <svg viewBox="33 33 134 134" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <defs>

<!-- CASE STUDIES - stacked on desktop, horizontal carousel on mobile -->
<div class="cases-carousel" id="work">

        container.appendChild(row);
      });
    } else if (path === 'intro.exp') {
      items.forEach(function (item) {
        var row = el('div', 'exp-row');
        var left = el('div');
        var role = el('div', 'role'); setText(role, item.role);
        var org = el('div', 'org'); setText(org, item.org);
        left.appendChild(role); left.appendChild(org);
        var period = el('div', 'period'); setText(period, item.period);
        row.appendChild(left); row.appendChild(period);
        container.appendChild(row);
      });
    } else if (path === 'kotowski.timeline') {
      items.forEach(function (step) {
        var row = el('div', 'step');
        var y = el('span', 'year'); setText(y, step.year);
        var l = el('span', 'label'); setText(l, step.label);
        row.appendChild(y); row.appendChild(l);
        container.appendChild(row);
      });
    } else if (path === 'italy.chapters') {
      items.forEach(function (ch) {
        var wrap = el('div', 'chapter');
        var num = el('div', 'num'); setText(num, ch.num);
        var body = el('div');
        var title = el('div', 'ch-title'); setText(title, ch.title);
        var p = el('p'); setText(p, ch.body);
        body.appendChild(title); body.appendChild(p);
        wrap.appendChild(num); wrap.appendChild(body);
        container.appendChild(wrap);
      });
    } else if (path === 'reviews.items') {
      var STAR = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l2.9 6.26 6.86.6-5.2 4.53 1.56 6.7L12 17.3 5.88 20.6l1.56-6.7-5.2-4.53 6.86-.6z"/></svg>';
      items.forEach(function (rev, i) {
        var card = el('div', 'rev-card');
        card.setAttribute('data-index', i);
        var inner = el('div', 'rev-inner');
        var stars = el('div', 'rev-stars'); stars.innerHTML = STAR + STAR + STAR + STAR + STAR;
        var quote = el('p', 'rev-quote'); setText(quote, '“' + rev.quote + '”');
        var who = el('div', 'rev-who');
        var avatar = el('div', 'rev-avatar'); setText(avatar, rev.initials);
        var meta = el('div');
        var name = el('div', 'rev-name'); setText(name, rev.name);
        var role = el('div', 'rev-role'); setText(role, rev.role);
        meta.appendChild(name); meta.appendChild(role);
        who.appendChild(avatar); who.appendChild(meta);
        inner.appendChild(stars); inner.appendChild(quote); inner.appendChild(who);
        card.appendChild(inner);
        container.appendChild(card);
      });
      if (window.__reviewsBuildDots) window.__reviewsBuildDots();
    } else if (path === 'zukowski.plates') {
      items.forEach(function (plate) {
        var wrap = el('div', 'plate');
        var num = el('div', 'num'); setText(num, '- ' + plate.num);
        var ph = el('div', 'placeholder');
        var label = el('div', 'plate-label'); setText(label, plate.label);
        var cap = el('p'); setText(cap, plate.caption);
        wrap.appendChild(num); wrap.appendChild(ph); wrap.appendChild(label); wrap.appendChild(cap);
        container.appendChild(wrap);
      });
    }
  }

  function render() {
    var t = translations[lang];
    document.documentElement.lang = lang;

    // Simple text bindings.
    document.querySelectorAll('[data-i18n]').forEach(function (node) {
      setText(node, resolve(t, node.getAttribute('data-i18n')));
    });

    // List bindings.
    document.querySelectorAll('[data-list]').forEach(function (node) {
      renderList(node, node.getAttribute('data-list'), t);
    });

    // Screenshot URL labels (for the lightbox chrome), localised.
    document.querySelectorAll('[data-i18n-url]').forEach(function (node) {
      node.setAttribute('data-url', resolve(t, node.getAttribute('data-i18n-url')) || '');
    });

    // Header + contact composed strings.
    document.getElementById('langBtn').textContent = lang === 'en' ? 'PL' : 'EN';
    document.getElementById('emailLink').textContent = t.contact.emailLabel + ' → stanzal2004@gmail.com';
    document.getElementById('waLink').textContent = t.contact.waLabel + ' → +61 400 462 453';
  }

  document.getElementById('langBtn').addEventListener('click', function () {
    lang = lang === 'en' ? 'pl' : 'en';
    render();
    // render() rewrites the .services cards - rebuild the desktop marquee.
    if (window.__servicesMarqueeApply) window.__servicesMarqueeApply();
  });

  render();

  // Usługi marquee (desktop only) - one row that slowly drifts sideways, pauses
  // on hover, and can be grabbed and dragged left/right by the user. The strip's
  // cards are cloned once so it loops seamlessly; a rAF loop owns the transform
  // (instead of a CSS keyframe) so a drag can scrub the same offset directly.
  // On mobile/tablet this stays inert and the carousel/grid below takes over.
  (function () {
    var services = document.querySelector('.intro-block .services');
    if (!services) return;

    var mq = window.matchMedia('(min-width: 901px)');
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)');
    var SPEED = 30; // px/sec of auto-drift (rightward)

    var track = null;    // current .marquee-track
    var half = 0;        // width of one card set (original, incl. trailing gap)
    var offset = 0;      // current translateX in px (kept within (-half, 0])
    var rafId = null, lastTs = 0;
    var hovering = false, dragging = false;
    var dragStartX = 0, dragStartOffset = 0, dragMoved = 0, pointerId = null;

    // Normalise offset into (-half, 0] so translateX always shows a filled row.
    function wrap(x) {
      if (!half) return 0;
      x = x % half;          // (-half, half)
      if (x > 0) x -= half;  // (-half, 0]
      return x;
    }
    function paint() {
      if (track) track.style.transform = 'translateX(' + offset + 'px)';
    }

    function loop(ts) {
      rafId = requestAnimationFrame(loop);
      if (!track) return;
      var dt = lastTs ? (ts - lastTs) / 1000 : 0;
      lastTs = ts;
      if (!dragging && !hovering && !reduce.matches) {
        // Drift rightward: cards enter from the left and travel to the right.
        offset = wrap(offset + SPEED * dt);
        paint();
      }
    }
    function startLoop() {
      if (rafId == null) { lastTs = 0; rafId = requestAnimationFrame(loop); }
    }
    function stopLoop() {
      if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
    }

    // --- pointer drag scrubbing ---
    function onDown(e) {
      if (!track || e.button != null && e.button !== 0) return;
      dragging = true; dragMoved = 0;
      dragStartX = e.clientX;
      dragStartOffset = offset;
      pointerId = e.pointerId;
      services.classList.add('is-dragging');
      if (services.setPointerCapture && pointerId != null) {
        try { services.setPointerCapture(pointerId); } catch (err) {}
      }
    }
    function onMove(e) {
      if (!dragging) return;
      var dx = e.clientX - dragStartX;
      dragMoved = Math.max(dragMoved, Math.abs(dx));
      offset = wrap(dragStartOffset + dx);
      paint();
    }
    function onUp() {
      if (!dragging) return;
      dragging = false;
      services.classList.remove('is-dragging');
      if (services.releasePointerCapture && pointerId != null) {
        try { services.releasePointerCapture(pointerId); } catch (err) {}
      }
      pointerId = null;
    }
    // Swallow the click that follows a real drag (guards any future card links).
    function onClick(e) {
      if (dragMoved > 5) { e.preventDefault(); e.stopPropagation(); dragMoved = 0; }
    }

    function bind() {
      services.addEventListener('pointerenter', function () { hovering = true; });
      services.addEventListener('pointerleave', function () { hovering = false; });
      services.addEventListener('pointerdown', onDown);
      services.addEventListener('pointermove', onMove);
      services.addEventListener('pointerup', onUp);
      services.addEventListener('pointercancel', onUp);
      services.addEventListener('click', onClick, true);
      services.addEventListener('dragstart', function (e) { e.preventDefault(); });
    }
    var bound = false;

    function teardown() {
      services.classList.remove('is-marquee', 'is-dragging');
      stopLoop();
      track = null;
      var existing = services.querySelector('.marquee-track');
      if (!existing) return;
      // Lift the original (non-clone) cards back out, drop the wrapper + clones.
      var frag = document.createDocumentFragment();
      existing.querySelectorAll('.service:not([data-clone])').forEach(function (card) {
        frag.appendChild(card);
      });
      services.innerHTML = '';
      services.appendChild(frag);
    }

    function build() {
      // Rebuild cleanly each time (render() may have replaced the cards).
      var existing = services.querySelector('.marquee-track');
      var cards;
      if (existing) {
        cards = Array.prototype.slice.call(existing.querySelectorAll('.service:not([data-clone])'));
      } else {
        cards = Array.prototype.slice.call(services.querySelectorAll('.service'));
      }
      if (!cards.length) return;

      var newTrack = document.createElement('div');
      newTrack.className = 'marquee-track';
      cards.forEach(function (card) { newTrack.appendChild(card); });
      // Clone the whole set once so the strip can wrap on an identical frame.
      cards.forEach(function (card) {
        var clone = card.cloneNode(true);
        clone.setAttribute('data-clone', '');
        clone.setAttribute('aria-hidden', 'true');
        newTrack.appendChild(clone);
      });
      services.innerHTML = '';
      services.appendChild(newTrack);
      services.classList.add('is-marquee');

      track = newTrack;
      // Half the full strip = one original set incl. the gap that follows it.
      half = newTrack.scrollWidth / 2;
      offset = wrap(offset);
      paint();
      if (!bound) { bind(); bound = true; }
      startLoop();
    }

    function apply() {
      if (mq.matches) build();
      else teardown();
    }

    // Re-apply after each render (language switch rebuilds .service cards).
    window.__servicesMarqueeApply = apply;
    apply();
    (mq.addEventListener ? mq.addEventListener.bind(mq, 'change') : mq.addListener.bind(mq))(apply);
    // Recompute the wrap width if the viewport (and card sizing) changes.
    window.addEventListener('resize', function () {
      if (track) { half = track.scrollWidth / 2; offset = wrap(offset); paint(); }
    });
  })();

  // Usługi carousel dots (mobile only) - mirror the scroll position.
  (function () {
    var track = document.querySelector('.intro-block .services');
    var dotsWrap = document.querySelector('.intro-block .services-dots');
    if (!track || !dotsWrap) return;

    function buildDots() {
      var count = track.querySelectorAll('.service').length;
      if (dotsWrap.children.length === count) return;
      dotsWrap.innerHTML = '';
      for (var i = 0; i < count; i++) {
        var dot = document.createElement('span');
        dot.className = 'dot' + (i === 0 ? ' is-active' : '');
        dotsWrap.appendChild(dot);
      }
    }

    function updateActive() {
      var cards = track.querySelectorAll('.service');
      if (!cards.length) return;
      // Pick the card whose left edge is closest to the track's scroll start.
      var trackLeft = track.getBoundingClientRect().left + 20; // account for scroll-padding
      var active = 0, best = Infinity;
      cards.forEach(function (card, i) {
        var dist = Math.abs(card.getBoundingClientRect().left - trackLeft);
        if (dist < best) { best = dist; active = i; }
      });
      dotsWrap.querySelectorAll('.dot').forEach(function (dot, i) {
        dot.classList.toggle('is-active', i === active);
      });
    }

    buildDots();
    var raf = null;
    track.addEventListener('scroll', function () {
      if (raf) return;
      raf = requestAnimationFrame(function () { raf = null; updateActive(); });
    }, { passive: true });
    // Rebuild after language switches (card count is stable, but stay safe).
    document.getElementById('langBtn').addEventListener('click', function () {
      setTimeout(function () { buildDots(); updateActive(); }, 0);
    });
  })();

  // Case studies carousel (mobile only) - number pills mirror & drive the scroll.
  (function () {
    var track = document.querySelector('.cases-track');
    var pillsWrap = document.querySelector('.cases-pills');
    if (!track || !pillsWrap) return;

    var pages = track.querySelectorAll(':scope > section');

    function buildPills() {
      if (pillsWrap.children.length === pages.length) return;
      pillsWrap.innerHTML = '';
      pages.forEach(function (page, i) {
        var pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'pill' + (i === 0 ? ' is-active' : '');
        pill.setAttribute('role', 'tab');
        pill.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
        pill.textContent = (i + 1 < 10 ? '0' : '') + (i + 1);
        pill.addEventListener('click', function () {
          track.scrollTo({ left: page.offsetLeft, behavior: 'smooth' });
        });
        pillsWrap.appendChild(pill);
      });
    }

    function activeIndex() {
      var trackLeft = track.getBoundingClientRect().left;
      var active = 0, best = Infinity;
      pages.forEach(function (page, i) {
        var dist = Math.abs(page.getBoundingClientRect().left - trackLeft);
        if (dist < best) { best = dist; active = i; }
      });
      return active;
    }

    function updateActive() {
      var active = activeIndex();
      pillsWrap.querySelectorAll('.pill').forEach(function (pill, i) {
        var on = i === active;
        pill.classList.toggle('is-active', on);
        pill.setAttribute('aria-selected', on ? 'true' : 'false');
      });
    }

    buildPills();
    var raf = null;
    track.addEventListener('scroll', function () {
      if (raf) return;
      raf = requestAnimationFrame(function () { raf = null; updateActive(); });
    }, { passive: true });
    document.getElementById('langBtn').addEventListener('click', function () {
      setTimeout(function () { buildPills(); updateActive(); }, 0);
    });
  })();

  // Reviews - a horizontal scroll-snap track. Swipe with a thumb, or grab and
  // drag with a mouse (same feel as the usługi row). Autoplay nudges to the
  // next card and pauses while the user is interacting. Dots mirror position
  // and jump on click.
  (function () {
    var stage = document.querySelector('.reviews .stage');
    var dotsWrap = document.querySelector('.reviews .rev-dots');
    if (!stage || !dotsWrap) return;

    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)');
    var current = 0, timer = null;
    var DELAY = 6000;
    var interacting = false; // hover / focus / active drag - pauses autoplay

    function cards() { return stage.querySelectorAll('.rev-card'); }

    // Index of the card whose centre is nearest the viewport centre.
    function activeIndex() {
      var list = cards();
      if (!list.length) return 0;
      var mid = stage.scrollLeft + stage.clientWidth / 2;
      var best = 0, bestDist = Infinity;
      list.forEach(function (c, i) {
        var cMid = c.offsetLeft + c.offsetWidth / 2;
        var d = Math.abs(cMid - mid);
        if (d < bestDist) { bestDist = d; best = i; }
      });
      return best;
    }

    function updateDots() {
      current = activeIndex();
      dotsWrap.querySelectorAll('button').forEach(function (b, i) {
        var on = i === current;
        b.classList.toggle('is-active', on);
        b.setAttribute('aria-selected', on ? 'true' : 'false');
      });
    }

    function scrollToCard(i, smooth) {
      var list = cards();
      if (!list.length) return;
      i = (i + list.length) % list.length;
      var c = list[i];
      var left = c.offsetLeft - (stage.clientWidth - c.offsetWidth) / 2;
      stage.scrollTo({ left: left, behavior: smooth === false ? 'auto' : 'smooth' });
    }

    function next() { scrollToCard(current + 1, true); }

    function stop() { if (timer) { clearInterval(timer); timer = null; } }
    function start() {
      stop();
      if (reduce.matches || interacting || cards().length < 2) return;
      timer = setInterval(next, DELAY);
    }

    // Keep dots in sync with scrolling (native swipe, drag, or programmatic).
    var raf = null;
    stage.addEventListener('scroll', function () {
      if (raf) return;
      raf = requestAnimationFrame(function () { raf = null; updateDots(); });
    }, { passive: true });

    // Pause autoplay while the pointer is over the track or focus is inside it.
    stage.addEventListener('pointerenter', function () { interacting = true; stop(); });
    stage.addEventListener('pointerleave', function () { interacting = false; start(); });
    stage.addEventListener('focusin', function () { interacting = true; stop(); });
    stage.addEventListener('focusout', function () { interacting = false; start(); });

    // --- mouse drag-to-scroll (touch already scrolls natively) ---
    var dragging = false, startX = 0, startScroll = 0, moved = 0, pointerId = null;
    stage.addEventListener('pointerdown', function (e) {
      if (e.pointerType === 'touch') return; // let native touch scrolling handle it
      if (e.button != null && e.button !== 0) return;
      dragging = true; moved = 0;
      startX = e.clientX; startScroll = stage.scrollLeft;
      pointerId = e.pointerId;
      stage.classList.add('is-dragging');
      try { stage.setPointerCapture(pointerId); } catch (err) {}
    });
    stage.addEventListener('pointermove', function (e) {
      if (!dragging) return;
      var dx = e.clientX - startX;
      moved = Math.max(moved, Math.abs(dx));
      stage.scrollLeft = startScroll - dx;
    });
    function endDrag() {
      if (!dragging) return;
      dragging = false;
      stage.classList.remove('is-dragging');
      if (pointerId != null) { try { stage.releasePointerCapture(pointerId); } catch (err) {} pointerId = null; }
      // Settle onto the nearest card, then resume autoplay if idle.
      scrollToCard(activeIndex(), true);
    }
    stage.addEventListener('pointerup', endDrag);
    stage.addEventListener('pointercancel', endDrag);
    // Suppress the click that follows a real drag.
    stage.addEventListener('click', function (e) {
      if (moved > 5) { e.preventDefault(); e.stopPropagation(); moved = 0; }
    }, true);
    stage.addEventListener('dragstart', function (e) { e.preventDefault(); });

    // Rebuilt each time renderList repaints the cards (initial load + lang switch).
    window.__reviewsBuildDots = function () {
      var list = cards();
      dotsWrap.innerHTML = '';
      list.forEach(function (c, i) {
        var b = document.createElement('button');
        b.type = 'button';
        b.setAttribute('role', 'tab');
        b.setAttribute('aria-label', 'Review ' + (i + 1));
        b.addEventListener('click', function () { scrollToCard(i, true); });
        dotsWrap.appendChild(b);
      });
      current = Math.min(current, Math.max(0, list.length - 1));
      scrollToCard(current, false);
      updateDots();
      start();
    };

    // renderList already ran during render(); build dots for the current cards.
    window.__reviewsBuildDots();
  })();

  // Lightbox - click any screenshot to inspect it full-size.
  (function () {
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lightboxImg');
    var lbUrl = document.getElementById('lightboxUrl');
    var lbClose = document.getElementById('lightboxClose');
    if (!lb || !lbImg) return;

    var lastFocus = null;

    function open(btn) {
      var src = btn.getAttribute('data-shot');
      var img = btn.querySelector('img');
      lastFocus = btn;
      lbImg.src = src;
      lbImg.alt = img ? img.getAttribute('alt') : (btn.getAttribute('aria-label') || '');
      // Match the section's screenshot treatment (żukowski is grayscale).
      lbImg.style.filter = img ? getComputedStyle(img).filter : 'none';
      lbUrl.textContent = btn.getAttribute('data-url') || '';
      lb.classList.add('is-open');
      lb.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      lbClose.focus();
    }

    function close() {
      lb.classList.remove('is-open');
      lb.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      if (lastFocus) lastFocus.focus();
    }

    document.querySelectorAll('.shot-btn').forEach(function (btn) {
      btn.addEventListener('click', function () { open(btn); });
    });
    lbClose.addEventListener('click', close);
    lb.addEventListener('click', function (e) {
      if (e.target === lb) close();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && lb.classList.contains('is-open')) close();
    });
  })();

  // Scroll reveal.
  var revealEls = document.querySelectorAll('.reveal');
  if ('IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    revealEls.forEach(function (el) { observer.observe(el); });
  } else {
    revealEls.forEach(function (el) { el.classList.add('is-visible'); });
  }
})();
</script>
