<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stan — Freelance Web Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Baloo+2:wght@500;600;700;800&family=EB+Garamond:ital,wght@1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    -webkit-font-smoothing: antialiased;
    font-family: 'Inter', sans-serif;
    background: #FAF9F6;
    color: #17140F;
    width: 100%;
    overflow-x: hidden;
  }
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* Animated morphing blob — sits to the right of the hero text */
  .blob-divider {
    position: absolute; z-index: 0;
    top: 50%; right: 6%; transform: translateY(-50%);
    pointer-events: none;
  }
  .blob-divider svg { display: block; width: 260px; height: 260px; overflow: visible; }
  .blob-divider path {
    fill: oklch(0.55 0.14 55 / 0.12);
    stroke: oklch(0.55 0.14 55); stroke-width: 2;
  }
  @media (max-width: 900px) {
    .blob-divider { opacity: 0.5; right: -4%; }
  }
  @media (max-width: 640px) {
    .blob-divider { display: none; }
  }

  /* Scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(48px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px;
    background: rgba(250,249,246,0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(23,20,15,0.08);
  }
  .brand { font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }
  .brand span { color: oklch(0.55 0.14 55); }
  .lang-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; background: transparent;
    border: 1px solid rgba(23,20,15,0.25); border-radius: 999px;
    padding: 7px 14px; cursor: pointer; color: #17140F;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .lang-btn:hover { border-color: #17140F; background: rgba(23,20,15,0.06); }

  /* Hero */
  .hero { position: relative; overflow: hidden; }
  .hero-inner { position: relative; z-index: 1; padding: 120px 40px 100px; max-width: 1040px; margin: 0 auto; }
  .hero-kicker {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: oklch(0.55 0.14 55); margin-bottom: 28px;
  }
  .hero h1 {
    font-size: clamp(38px, 6.4vw, 84px); line-height: 1.04;
    letter-spacing: -0.03em; font-weight: 800; margin: 0 0 32px; max-width: 920px;
  }
  .hero-sub {
    font-size: clamp(17px, 2vw, 21px); line-height: 1.55;
    color: rgba(23,20,15,0.65); max-width: 560px; margin: 0 0 40px;
  }
  .hero-stat {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.4;
    color: rgba(23,20,15,0.6); padding: 13px 22px 13px 18px;
    border: 1px solid rgba(23,20,15,0.14); border-radius: 999px;
    max-width: 100%;
  }
  .hero-stat .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: oklch(0.55 0.14 55); animation: pulseDot 2s ease infinite; flex-shrink: 0;
  }
  .hero-stat .stat-text { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 12px; min-width: 0; }
  .hero-stat .sep { color: rgba(23,20,15,0.3); }
  @media (max-width: 560px) {
    .hero-stat {
      display: flex; width: 100%; box-sizing: border-box;
      border-radius: 20px; align-items: flex-start; padding: 16px 18px; gap: 11px; font-size: 12px;
    }
    .hero-stat .dot { margin-top: 5px; }
    .hero-stat .stat-text { flex: 1 1 auto; min-width: 0; flex-direction: column; align-items: stretch; gap: 8px; }
    .hero-stat .stat-text > span { display: block; overflow-wrap: anywhere; width: 100%; }
    .hero-stat .stat-text > span.sep { display: none; }
  }

  .browser-bar {
    display: flex; align-items: center; gap: 8px; padding: 12px 16px;
  }
  .browser-bar .cd { width: 9px; height: 9px; border-radius: 50%; }
  .browser-bar .url {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-left: 10px;
  }
  .browser-shot { display: block; width: 100%; height: auto; }

  /* Clickable screenshots — subtle "inspect" affordance */
  .shot-wrap { position: relative; }
  .shot-btn {
    display: block; width: 100%; padding: 0; border: 0; margin: 0;
    background: none; cursor: zoom-in; -webkit-tap-highlight-color: transparent;
    font: inherit; color: inherit; text-align: left;
  }
  .shot-btn .browser-shot { transition: transform 0.5s cubic-bezier(0.2,0.7,0.2,1); }
  .shot-btn:hover .browser-shot { transform: scale(1.015); }
  .shot-zoom {
    position: absolute; z-index: 2; right: 14px; bottom: 14px;
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.06em;
    padding: 8px 13px; border-radius: 999px; pointer-events: none;
    background: rgba(17,20,15,0.62); color: #FAF9F6; backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    opacity: 0; transform: translateY(6px); transition: opacity 0.28s ease, transform 0.28s ease;
  }
  .shot-btn:hover .shot-zoom, .shot-btn:focus-visible .shot-zoom { opacity: 1; transform: translateY(0); }
  .shot-btn:focus-visible { outline: 2px solid oklch(0.55 0.14 55); outline-offset: 4px; }
  .shot-zoom svg { width: 13px; height: 13px; display: block; }
  @media (hover: none) {
    .shot-zoom { opacity: 1; transform: none; }
    .shot-btn:hover .browser-shot { transform: none; }
  }

  /* Lightbox modal */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: clamp(16px, 4vw, 48px);
    background: rgba(20,17,12,0.72); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    opacity: 0; visibility: hidden; transition: opacity 0.32s ease, visibility 0.32s ease;
  }
  .lightbox.is-open { opacity: 1; visibility: visible; }
  .lightbox-frame {
    position: relative; width: 100%; max-width: 1200px; max-height: 100%;
    display: flex; flex-direction: column;
    border-radius: 12px; overflow: hidden;
    background: #FAF9F6; box-shadow: 0 40px 120px rgba(0,0,0,0.6);
    transform: translateY(18px) scale(0.98);
    transition: transform 0.36s cubic-bezier(0.2,0.8,0.2,1);
  }
  .lightbox.is-open .lightbox-frame { transform: translateY(0) scale(1); }
  .lightbox-bar {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    padding: 12px 16px; background: #17140F;
  }
  .lightbox-bar .cd { width: 9px; height: 9px; border-radius: 50%; background: #C9A227; }
  .lightbox-bar .cd:nth-child(2) { opacity: 0.6; }
  .lightbox-bar .cd:nth-child(3) { opacity: 0.35; }
  .lightbox-bar .lb-url {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(250,249,246,0.55); margin-left: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .lightbox-close {
    margin-left: auto; flex-shrink: 0;
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(250,249,246,0.1); border: 1px solid rgba(250,249,246,0.2);
    color: #FAF9F6; transition: background 0.2s ease, border-color 0.2s ease;
  }
  .lightbox-close:hover { background: rgba(250,249,246,0.2); border-color: rgba(250,249,246,0.45); }
  .lightbox-close svg { width: 15px; height: 15px; }
  .lightbox-scroll { overflow: auto; -webkit-overflow-scrolling: touch; background: #FAF9F6; }
  .lightbox-img { display: block; width: 100%; height: auto; }
  @media (max-width: 560px) {
    .lightbox { padding: 12px; }
    .lightbox-frame { border-radius: 10px; }
    .lightbox-bar .lb-url { font-size: 10px; }
  }

  .eyebrow {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
  }
  .mono-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.14em; text-transform: uppercase;
  }

  /* Case 01 — Kotowski */
  .kotowski { background: #12201A; color: #F3EFE6; padding: 100px 40px; position: relative; }
  .kotowski .inner { max-width: 1080px; margin: 0 auto; }
  .kotowski .head-row {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 16px; margin-bottom: 36px;
    border-bottom: 1px solid rgba(201,162,39,0.35); padding-bottom: 24px;
  }
  .kotowski .head-row .tag { color: #C9A227; }
  .kotowski .head-row .domain { font-family:'JetBrains Mono',monospace; font-size:12px; color: rgba(243,239,230,0.5); }
  .kotowski h2 {
    font-family: 'Playfair Display', serif; font-size: clamp(30px,4.4vw,54px);
    font-weight: 600; line-height: 1.15; max-width: 800px; margin: 0 0 40px;
  }
  .kotowski .shot-wrap {
    border-radius: 12px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.35); margin-bottom: 56px;
  }
  .kotowski .browser-bar { background: #0C1712; }
  .kotowski .browser-bar .url { color: rgba(243,239,230,0.5); }
  .kotowski .grid {
    display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 56px; margin-bottom: 56px;
  }
  .kotowski .col { display: flex; flex-direction: column; gap: 24px; }
  .kotowski .col-right { display: flex; flex-direction: column; gap: 20px; }
  .kotowski .eyebrow { color: rgba(243,239,230,0.5); }
  .kotowski p { font-size: 16px; line-height: 1.6; margin: 0; color: rgba(243,239,230,0.9); }
  .kotowski .stack-val { font-family:'JetBrains Mono',monospace; font-size:14px; margin:0; color:#C9A227; }
  .kotowski .chip {
    display: inline-flex; align-self: flex-start; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.06em;
    border: 1px solid #C9A227; color: #C9A227; border-radius: 999px; padding: 8px 16px;
  }
  .kotowski .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: #C9A227; }
  .kotowski .timeline { display: flex; flex-wrap: wrap; gap: 12px; }
  .kotowski .timeline .step {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid rgba(201,162,39,0.4); border-radius: 999px; padding: 10px 18px;
  }
  .kotowski .timeline .year { font-family:'JetBrains Mono',monospace; font-size:12px; color:#C9A227; }
  .kotowski .timeline .label { font-size: 14px; color: #F3EFE6; }

  /* Case 02 — Dzieciaki */
  .dzieciaki { background: #FFFFFF; color: #0A2A3D; padding: 100px 40px; position: relative; overflow: hidden; }
  .dzieciaki .blob-1 { position:absolute; top:-120px; right:-120px; width:340px; height:340px; border-radius:50%; background:#00A0E3; opacity:0.12; }
  .dzieciaki .blob-2 { position:absolute; bottom:-100px; left:-60px; width:220px; height:220px; border-radius:50%; background:#FFD23F; opacity:0.18; }
  .dzieciaki .inner { max-width: 1080px; margin: 0 auto; position: relative; }
  .dzieciaki .head-row {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 16px; margin-bottom: 32px;
  }
  .dzieciaki .tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.1em;
    text-transform: uppercase; background: #00A0E3; color: #fff;
    border-radius: 999px; padding: 8px 16px;
  }
  .dzieciaki .domain { font-family:'JetBrains Mono',monospace; font-size:12px; color: rgba(10,42,61,0.5); }
  .dzieciaki h2 {
    font-family: 'Baloo 2', sans-serif; font-size: clamp(32px,5vw,58px);
    font-weight: 700; line-height: 1.08; max-width: 820px; margin: 0 0 20px; color: #0A2A3D;
  }
  .dzieciaki .intro { font-size:16px; line-height:1.6; max-width:600px; color:rgba(10,42,61,0.75); margin:0 0 40px; }
  .dzieciaki .shot-wrap {
    border-radius: 20px; overflow: hidden; box-shadow: 0 24px 60px rgba(10,42,61,0.18); margin-bottom: 44px;
  }
  .dzieciaki .browser-bar { background: #0A2A3D; }
  .dzieciaki .browser-bar .url { color: rgba(255,255,255,0.6); }
  .dzieciaki .cards { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: stretch; }
  .dzieciaki .card-yellow {
    background: #FFF6D9; border: 2px solid #FFD23F; border-radius: 24px; padding: 32px;
  }
  .dzieciaki .card-yellow .card-title {
    font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 22px; margin-bottom: 12px; color: #0A2A3D;
  }
  .dzieciaki .card-yellow p { font-size:15px; line-height:1.6; margin:0; color:rgba(10,42,61,0.8); }
  .dzieciaki .card-dark { background: #0A2A3D; border-radius: 24px; padding: 32px; color: #fff; }
  .dzieciaki .card-dark .eyebrow { color: #00A0E3; }
  .dzieciaki .card-dark p { font-size:15px; line-height:1.6; margin:0; color:rgba(255,255,255,0.85); }

  /* Case 03 — Italy */
  .italy { background: #16141A; color: #EDE7DD; padding: 120px 40px; }
  .italy .inner { max-width: 900px; margin: 0 auto; }
  .italy .head-row {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 16px; margin-bottom: 56px;
  }
  .italy .tag { color: #B99A6B; }
  .italy .domain { font-family:'JetBrains Mono',monospace; font-size:12px; color: rgba(237,231,221,0.45); }
  .italy h2 {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500;
    font-size: clamp(34px,5vw,64px); line-height: 1.15; margin: 0 0 24px; text-align: center;
  }
  .italy .intro {
    font-size: 16px; line-height: 1.7; text-align: center;
    color: rgba(237,231,221,0.65); max-width: 520px; margin: 0 auto 56px;
  }
  .italy .shot-wrap {
    border-radius: 4px; overflow: hidden; box-shadow: 0 24px 70px rgba(0,0,0,0.5);
    margin-bottom: 56px; border: 1px solid rgba(185,154,107,0.3);
  }
  .italy .browser-bar { background: #0F0D12; }
  .italy .browser-bar .cd { background: transparent; border: 1px solid #B99A6B; }
  .italy .browser-bar .url { color: rgba(237,231,221,0.5); }
  .italy .stat-box {
    border: 1px solid rgba(185,154,107,0.35); border-radius: 4px; padding: 32px; margin-bottom: 56px;
  }
  .italy .stat-box .stat-title {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 600;
    font-size: 24px; margin-bottom: 12px; color: #EDE7DD;
  }
  .italy .stat-box p { font-size:15px; line-height:1.6; margin:0; color:rgba(237,231,221,0.7); }
  .italy .chapters-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: #B99A6B; text-align: center; margin-bottom: 32px;
  }
  .italy .chapters { display: flex; flex-direction: column; }
  .italy .chapter {
    display: grid; grid-template-columns: 60px 1fr; gap: 28px; padding: 28px 0;
    border-top: 1px solid rgba(185,154,107,0.25);
  }
  .italy .chapter .num { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:32px; color:#B99A6B; }
  .italy .chapter .ch-title {
    font-family:'Cormorant Garamond',serif; font-style:italic; font-size:22px; font-weight:600; margin-bottom:8px;
  }
  .italy .chapter p { font-size:15px; line-height:1.6; color:rgba(237,231,221,0.65); margin:0; }

  /* Case 04 — Żukowski */
  .zukowski { background: #FFFFFF; color: #111111; padding: 120px 40px; border-top: 1px solid #111; border-bottom: 1px solid #111; }
  .zukowski .inner { max-width: 1080px; margin: 0 auto; }
  .zukowski .head-row {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 16px; margin-bottom: 12px;
  }
  .zukowski .domain { font-family:'JetBrains Mono',monospace; font-size:12px; color: rgba(17,17,17,0.5); }
  .zukowski .rule { height: 1px; background: #111; margin-bottom: 48px; }
  .zukowski h2 {
    font-family: 'EB Garamond', serif; font-style: italic; font-weight: 500;
    font-size: clamp(30px,4.4vw,52px); line-height: 1.15; max-width: 780px; margin: 0 0 20px;
  }
  .zukowski .intro { font-size:16px; line-height:1.6; max-width:560px; color:rgba(17,17,17,0.65); margin:0 0 48px; }
  .zukowski .shot-wrap { border: 1px solid #111; margin-bottom: 64px; }
  .zukowski .browser-bar { border-bottom: 1px solid #111; }
  .zukowski .browser-bar .cd { background: transparent; border: 1px solid #111; }
  .zukowski .browser-bar .url { color: rgba(17,17,17,0.5); }
  .zukowski .browser-shot { filter: grayscale(1); }
  .zukowski .plates { display: grid; grid-template-columns: repeat(3,1fr); gap: 0; border-top: 1px solid #111; }
  .zukowski .plate { border-right: 1px solid #111; padding: 28px 24px; }
  .zukowski .plate .num { font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(17,17,17,0.5); margin-bottom:36px; }
  .zukowski .plate .placeholder {
    aspect-ratio: 4/3; margin-bottom: 20px; border: 1px solid #111;
    background: repeating-linear-gradient(135deg,#f2f2f2,#f2f2f2 8px,#e2e2e2 8px,#e2e2e2 16px);
  }
  .zukowski .plate .plate-label { font-family:'EB Garamond',serif; font-style:italic; font-size:20px; margin-bottom:8px; }
  .zukowski .plate p { font-size:13px; line-height:1.5; color:rgba(17,17,17,0.6); margin:0; }

  /* About */
  .about { background: #FAF9F6; color: #17140F; padding: 96px 40px 80px; }
  .about .inner { max-width: 1080px; margin: 0 auto; }
  .about .title {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: oklch(0.55 0.14 55); margin-bottom: 20px;
  }
  .about .bio { font-size: clamp(18px,2.4vw,24px); line-height: 1.5; max-width: 680px; margin: 0 0 56px; font-weight: 500; }
  .about .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; }
  .about .col-label { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(23,20,15,0.5); margin-bottom:16px; }
  .about .stack-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .about .stack-item {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid rgba(23,20,15,0.14); border-radius: 10px; padding: 10px 12px;
  }
  .about .stack-item .initial {
    width: 22px; height: 22px; border-radius: 50%; background: #17140F; color: #FAF9F6;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .about .stack-item .name { font-size: 13px; }
  .about .exp-list { display: flex; flex-direction: column; }
  .about .exp-item {
    display: flex; justify-content: space-between; gap: 12px; padding: 12px 0;
    border-top: 1px solid rgba(23,20,15,0.1);
  }
  .about .exp-item .role { font-size: 14px; font-weight: 600; }
  .about .exp-item .org { font-size: 13px; color: rgba(23,20,15,0.55); }
  .about .exp-item .period { font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(23,20,15,0.5); white-space:nowrap; }

  /* Contact */
  .contact { background: #17140F; color: #FAF9F6; padding: 100px 40px 48px; }
  .contact .inner { max-width: 1080px; margin: 0 auto; }
  .contact h2 { font-size: clamp(32px,5vw,56px); font-weight: 800; letter-spacing: -0.02em; margin: 0 0 20px; }
  .contact .body { font-size:17px; line-height:1.6; color:rgba(250,249,246,0.65); max-width:520px; margin:0 0 40px; }
  .contact .links { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 64px; }
  .contact .link {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    border-radius: 999px; padding: 14px 24px; text-decoration: none; font-weight: 600;
    transition: border-color 0.2s ease, opacity 0.2s ease;
  }
  .contact .link-primary { background: oklch(0.55 0.14 55); color: #17140F; }
  .contact .link-primary:hover { opacity: 0.9; }
  .contact .link-ghost { border: 1px solid rgba(250,249,246,0.3); color: #FAF9F6; }
  .contact .link-ghost:hover { border-color: #FAF9F6; }

    if (className) node.className = className;
    return node;
  }

  function setText(node, text) { node.textContent = text == null ? '' : text; }

  // Build DOM for each list section (kept explicit so markup matches the design).
  function renderList(container, path, t) {
    var items = resolve(t, path) || [];
    container.innerHTML = '';

    if (path === 'kotowski.timeline') {
      items.forEach(function (step) {
        var row = el('div', 'step');
        var y = el('span', 'year'); setText(y, step.year);
        var l = el('span', 'label'); setText(l, step.label);
        row.appendChild(y); row.appendChild(l);
        container.appendChild(row);
      });
    } else if (path === 'italy.chapters') {
      items.forEach(function (ch) {
        var wrap = el('div', 'chapter');
        var num = el('div', 'num'); setText(num, ch.num);
        var body = el('div');
        var title = el('div', 'ch-title'); setText(title, ch.title);
        var p = el('p'); setText(p, ch.body);
        body.appendChild(title); body.appendChild(p);
        wrap.appendChild(num); wrap.appendChild(body);
        container.appendChild(wrap);
      });
    } else if (path === 'zukowski.plates') {
      items.forEach(function (plate) {
        var wrap = el('div', 'plate');
        var num = el('div', 'num'); setText(num, '— ' + plate.num);
        var ph = el('div', 'placeholder');
        var label = el('div', 'plate-label'); setText(label, plate.label);
        var cap = el('p'); setText(cap, plate.caption);
        wrap.appendChild(num); wrap.appendChild(ph); wrap.appendChild(label); wrap.appendChild(cap);
        container.appendChild(wrap);
      });
    } else if (path === 'about.stack') {
      items.forEach(function (name) {
        var item = el('div', 'stack-item');
        var initial = el('span', 'initial'); setText(initial, stackInitial(name));
        var nm = el('span', 'name'); setText(nm, name);
        item.appendChild(initial); item.appendChild(nm);
        container.appendChild(item);
      });
    } else if (path === 'about.exp') {
      items.forEach(function (item) {
        var row = el('div', 'exp-item');
        var left = el('div');
        var role = el('div', 'role'); setText(role, item.role);
        var org = el('div', 'org'); setText(org, item.org);
        left.appendChild(role); left.appendChild(org);
        var period = el('div', 'period'); setText(period, item.period);
        row.appendChild(left); row.appendChild(period);
        container.appendChild(row);
      });
    }
  }

  function render() {
    var t = translations[lang];
    document.documentElement.lang = lang;

    // Simple text bindings.
    document.querySelectorAll('[data-i18n]').forEach(function (node) {
      setText(node, resolve(t, node.getAttribute('data-i18n')));
    });

    // List bindings.
    document.querySelectorAll('[data-list]').forEach(function (node) {
      renderList(node, node.getAttribute('data-list'), t);
    });

    // Screenshot URL labels (for the lightbox chrome), localised.
    document.querySelectorAll('[data-i18n-url]').forEach(function (node) {
      node.setAttribute('data-url', resolve(t, node.getAttribute('data-i18n-url')) || '');
    });

    // Header + contact composed strings.
    document.getElementById('langBtn').textContent = lang === 'en' ? 'PL' : 'EN';
    document.getElementById('emailLink').textContent = t.contact.emailLabel + ' → stanzal2004@gmail.com';
    document.getElementById('waLink').textContent = t.contact.waLabel + ' → +48 881 228 832';
  }

  document.getElementById('langBtn').addEventListener('click', function () {
    lang = lang === 'en' ? 'pl' : 'en';
    render();
  });

  render();

  // Lightbox — click any screenshot to inspect it full-size.
  (function () {
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lightboxImg');
    var lbUrl = document.getElementById('lightboxUrl');
    var lbClose = document.getElementById('lightboxClose');
    if (!lb || !lbImg) return;

    var lastFocus = null;

    function open(btn) {
      var src = btn.getAttribute('data-shot');
      var img = btn.querySelector('img');
      lastFocus = btn;
      lbImg.src = src;
      lbImg.alt = img ? img.getAttribute('alt') : '';
      // Match the section's screenshot treatment (żukowski is grayscale).
      lbImg.style.filter = getComputedStyle(img).filter;
      lbUrl.textContent = btn.getAttribute('data-url') || '';
      lb.classList.add('is-open');
      lb.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      lbClose.focus();
    }

    function close() {
      lb.classList.remove('is-open');
      lb.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      if (lastFocus) lastFocus.focus();
    }

    document.querySelectorAll('.shot-btn').forEach(function (btn) {
      btn.addEventListener('click', function () { open(btn); });
    });
    lbClose.addEventListener('click', close);
    lb.addEventListener('click', function (e) {
      if (e.target === lb) close();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && lb.classList.contains('is-open')) close();
    });
  })();

  // Scroll reveal.
  var revealEls = document.querySelectorAll('.reveal');
  if ('IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    revealEls.forEach(function (el) { observer.observe(el); });
  } else {
    revealEls.forEach(function (el) { el.classList.add('is-visible'); });
  }
})();
</script>

<!-- ===================================================================
     Animated morphing-blob divider
     A closed organic shape whose control points breathe in and out on
     independent sine phases, so the outline slowly wobbles and morphs.
     The path is drawn as a smooth Catmull-Rom → Bézier loop.
     ================================================================== -->
<script>
(function () {
  const path = document.querySelector('.blob-path');
  if (!path) return;

  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const CX = 100, CY = 100;   // center (viewBox 200×200)
  const BASE = 58;            // base radius
  const AMP = 12;             // how far each point breathes
  const POINTS = 8;           // number of anchor points around the blob

  // Each point gets its own frequency + phase so the wobble looks organic.
  const seeds = [];
  for (let i = 0; i < POINTS; i++) {
    seeds.push({ freq: 0.6 + Math.random() * 0.9, phase: Math.random() * Math.PI * 2 });
  }

  // Build a smooth closed path through the current point set (Catmull-Rom).
  function build(time) {
    const pts = [];
    for (let i = 0; i < POINTS; i++) {
      const a = (i / POINTS) * Math.PI * 2;
      const r = BASE + Math.sin(time * seeds[i].freq + seeds[i].phase) * AMP;
      pts.push([CX + Math.cos(a) * r, CY + Math.sin(a) * r]);
    }
    let d = 'M' + pts[0][0].toFixed(1) + ' ' + pts[0][1].toFixed(1) + ' ';
    for (let i = 0; i < POINTS; i++) {
      const p0 = pts[(i - 1 + POINTS) % POINTS];
      const p1 = pts[i];
      const p2 = pts[(i + 1) % POINTS];
      const p3 = pts[(i + 2) % POINTS];
      const c1x = p1[0] + (p2[0] - p0[0]) / 6;
      const c1y = p1[1] + (p2[1] - p0[1]) / 6;
      const c2x = p2[0] - (p3[0] - p1[0]) / 6;
      const c2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += 'C' + c1x.toFixed(1) + ' ' + c1y.toFixed(1) + ' '
              + c2x.toFixed(1) + ' ' + c2y.toFixed(1) + ' '
              + p2[0].toFixed(1) + ' ' + p2[1].toFixed(1) + ' ';
    }
    return d + 'Z';
  }

  if (reduce) { path.setAttribute('d', build(0)); return; }

  const start = performance.now();
  function frame(now) {
    path.setAttribute('d', build((now - start) / 1000));
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
